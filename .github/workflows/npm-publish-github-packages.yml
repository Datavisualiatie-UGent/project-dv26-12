name: Deploy Pre-built Site to GitHub Pages

on:
  push:
    branches: ["main"] # Change to 'master' if necessary
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  # This job simply grabs your existing dist folder and prepares it for Pages
  prepare-files:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Points directly to the dist folder already in your repo
          path: ./dist 

  # This job takes the prepared files and hosts them
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: prepare-files
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
